<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../../css/general.css" />
    <link rel="stylesheet" href="../../css/header.css" />
    <link rel="stylesheet" href="../../css/ingame.css" />
    <link rel="stylesheet" href="../../css/modal.css" />
    <title>Marathon Companion</title>
  </head>
  <body class="desktop">
    <!-- -------------------------------- Header ------------------------------- -->

    <header id="header" class="app-header">
      <img class="header-logo" src="../../icons/logo-white-blue-side.png" />
      <h1>EFT Companion</h1>
      <h1 class="hotkey-text">
        Show/Hide Hotkey:
        <kbd id="hotkey" class="hotkey-bind-text"></kbd>
      </h1>
      <div class="window-controls-group">
        <button
          id="minimizeButton"
          class="window-control window-control-minimize"
        />
        <button
          id="maximizeButton"
          class="window-control window-control-maximize"
        />
        <button id="closeButton" class="window-control window-control-close" />
      </div>
    </header>

    <!-- --------------------------------- Main -------------------------------- -->
    <main>
      <div id="main-page-div">
        <div class="header-top">
          <button id="maps" type="button" class="btn btn-header">MAPS</button>
          <button id="quests" type="button" class="btn btn-header">QUESTS</button>
          <button id="traders" type="button" class="btn btn-header">
            TRADERS
          </button>
          <button id="ammoChart" type="button" class="btn btn-header">
            AMMO CHART
          </button>
        </div>
      </div>
    </main>
  </body>
</html>
