<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../../css/general.css" />
    <link rel="stylesheet" href="../../css/modal.css" />
    <link rel="stylesheet" href="../../css/header.css" />
    <link rel="stylesheet" href="../../css/settings.css" />
    <link rel="stylesheet" href="../../css/fileSave.css" />
    <link rel="stylesheet" href="../../css/frame.css" />
  </head>
  <body class="desktop">
    <!-- --------------------------------- Main -------------------------------- -->
    <main>
      <div id="file-page" class="page">
        <header id="header" class="app-header">
          <img class="header-logo" src="../../icons/logo-white-blue-side.png" alt=""/>
          <h1 id="file-saver-frame-title" class="frame-title">Save App Progression</h1>
          <div class="window-controls-group">
            <button id="closeButton" class="window-control window-control-close" />
          </div>
        </header>
        <div class="file-saver-page">
            <div class="file-saver-body">
                <div class="folder-selector-wrapper">
                    <div class="side-text-wrapper">
                        <p id="file-saver-folder-path" class="side-text">Folder:</p>
                    </div>
                    <div class="folder-selector-input-wrapper">
                        <input id="folder-selector-input" class="folder-selector-input" disabled/>
                    </div>
                    <div class="folder-selector-button-wrapper">
                        <button id="file-saver-folder-selector-button" class="folder-selector-button">Change</button>
                    </div>
                </div>
                <div class="file-name-selector-wrapper">
                    <div class="side-text-wrapper">
                        <p id="file-saver-file-name" class="side-text">File Name:</p>
                    </div>
                    <div class="folder-selector-input-wrapper">
                        <input id="file-name-input" class="file-name-input"/>
                    </div>
                </div>
            </div>
            <div class="apply-button-container">
                <button type="button" id="apply">Save</button>
            </div>
        </div>
      </div>
    </main>
  </body>
</html>
