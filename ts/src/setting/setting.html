<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../../css/general.css" />
    <link rel="stylesheet" href="../../css/modal.css" />
    <link rel="stylesheet" href="../../css/header.css" />
    <link rel="stylesheet" href="../../css/settings.css" />
    <link rel="stylesheet" href="../../css/frame.css" />
  </head>
  <body class="desktop">
    <!-- --------------------------------- Main -------------------------------- -->
    <main>
      <div class="page">
        <header id="header" class="app-header">
          <img class="header-logo" src="../../icons/logo-white-blue-side.png" />
          <h1 id="frame-title">Settings</h1>
          <div class="window-controls-group">
            <button id="closeButton" class="window-control window-control-close" />
          </div>
        </header>

        <div id="settings-options" class="settings-options">
          <button id="app-settings-button" class="settings-page-button setting-page-button-active">App</button>
          <button id="progression-settings-button" class="settings-page-button">Progression</button>
          <button id="map-settings-button" class="settings-page-button">Map</button>
        </div>

        <div id="settings-content" class="scroll-div settings-page">

        </div>

        <div class="apply-button-container">
          <button type="button" id="apply">Close</button>
        </div>

      </div>
    </main>
  </body>
</html>
