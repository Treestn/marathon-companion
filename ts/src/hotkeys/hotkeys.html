<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../../css/general.css" />
    <link rel="stylesheet" href="../../css/modal.css" />
    <link rel="stylesheet" href="../../css/header.css" />
    <link rel="stylesheet" href="../../css/hotkey.css" />
    <link rel="stylesheet" href="../../css/frame.css" />
  </head>
  <body class="desktop">
    <!-- --------------------------------- Main -------------------------------- -->
    <main id="hotkeys-main">
      <div class="page">
        <header id="header" class="app-header">
          <img class="header-logo" src="../../icons/logo-white-blue-side.png" />
          <h1 id="hotkey-frame-title" class="frames-title">Hotkey</h1>
          <div class="window-controls-group">
            <button id="closeButton" class="window-control window-control-close" />
          </div>
        </header>
        <div class="frame-content">
          <input type="text" id="hotkey-input" placeholder="Press a hotkey">
          <b id="hotkey-error-text" class="hotkey-error-text"></b>
          <button type="button" id="apply-hotkey">Apply</button>
        </div>
      </div>
    </main>
  </body>
</html>
